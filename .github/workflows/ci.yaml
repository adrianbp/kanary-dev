name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Cache tooling bin/
        uses: actions/cache@v4
        with:
          path: bin
          key: ${{ runner.os }}-tools-${{ hashFiles('Makefile') }}

      - name: Install tooling
        run: make controller-gen golangci-lint envtest

      - name: Generate + manifests
        run: |
          make generate
          make manifests

      - name: Verify no generated drift
        run: |
          git diff --exit-code -- . ':!bin' ':!cover.out' || {
            echo '::error::generated files are out of date. Run `make generate manifests`.'
            exit 1
          }

      - name: Lint
        run: make lint

      - name: Test (race + coverage)
        run: make test

      - name: Coverage gate (≥80%)
        run: |
          pct=$(go tool cover -func=cover.out | awk '/^total:/ {gsub("%",""); print $3}')
          echo "total coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 80.0) { exit 1 } }'

      - name: Build manager
        run: make build

  container:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: kanary:ci
