name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Cache tooling bin/
        uses: actions/cache@v4
        with:
          path: bin
          key: ${{ runner.os }}-tools-${{ hashFiles('Makefile') }}

      - name: Install tooling
        run: make controller-gen golangci-lint envtest gosec

      - name: Generate + manifests
        run: |
          make generate
          make manifests

      - name: Verify no generated drift
        run: |
          git diff --exit-code -- . ':!bin' ':!cover.out' || {
            echo '::error::generated files are out of date. Run `make generate manifests`.'
            exit 1
          }

      - name: Lint
        run: make lint

      - name: Security scan (gosec)
        run: make gosec

      - name: Test (race + coverage)
        run: make test

      - name: Coverage gate (≥80%)
        run: |
          { echo "mode: atomic"; grep '/internal/' cover.out; } > cover.internal.out
          pct=$(go tool cover -func=cover.internal.out | awk '/^total:/ {gsub("%",""); print $3}')
          echo "internal coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 80.0) { exit 1 } }'

      - name: Build manager
        run: make build

  helm:
    name: Helm chart lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.17.0"

      - name: Helm lint (default values)
        run: helm lint charts/kanary

      - name: Helm lint (cluster scope)
        run: helm lint charts/kanary --set scope.mode=cluster

      - name: Helm lint (multi-namespace scope)
        run: helm lint charts/kanary --set scope.mode=multi-namespace --set 'scope.namespaces[0]=ns1' --set 'scope.namespaces[1]=ns2'

  container:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: kanary:ci

      - name: Security scan image (Trivy CLI)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.65.0 image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            kanary:ci
