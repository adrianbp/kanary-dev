name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write       # create GitHub Release + upload assets
  packages: write       # push to GHCR
  id-token: write       # cosign keyless signing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_REPO: ${{ github.repository }}

jobs:
  # -------------------------------------------------------------------------
  # Build & push multi-arch operator image
  # -------------------------------------------------------------------------
  image:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # Generate SBOM and sign image
  # -------------------------------------------------------------------------
  sign:
    name: SBOM & sign
    runs-on: ubuntu-latest
    needs: image
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.image.outputs.image }}@${{ needs.image.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Attest SBOM to image
        run: |
          cosign attest --predicate sbom.spdx.json \
            --type spdxjson \
            --yes \
            ${{ needs.image.outputs.image }}@${{ needs.image.outputs.digest }}

      - name: Sign image (keyless)
        run: |
          cosign sign --yes \
            ${{ needs.image.outputs.image }}@${{ needs.image.outputs.digest }}

      - name: Upload SBOM as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.spdx.json

  # -------------------------------------------------------------------------
  # Package and push Helm chart to GHCR OCI
  # -------------------------------------------------------------------------
  chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: image
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.17.0"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} --password-stdin

      - name: Set chart version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version:.*/version: ${VERSION}/" charts/kanary/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/kanary/Chart.yaml

      - name: Package chart
        run: helm package charts/kanary --destination /tmp/chart

      - name: Push chart to GHCR OCI
        run: |
          helm push /tmp/chart/kanary-*.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Upload chart as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/chart/kanary-*.tgz

  # -------------------------------------------------------------------------
  # Create GitHub Release with changelog
  # -------------------------------------------------------------------------
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [sign, chart]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
