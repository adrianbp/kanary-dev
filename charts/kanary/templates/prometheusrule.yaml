{{- if .Values.observability.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "kanary.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kanary.labels" . | nindent 4 }}
spec:
  groups:
    - name: kanary.rules
      rules:

        - alert: KanaryCanaryStuckProgressing
          expr: |
            kanary_canary_phase{phase="Progressing"} == 1
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Canary {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.name {{ "}}" }} stuck in Progressing"
            description: >-
              Canary {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.name {{ "}}" }}
              has been in Progressing for over 30 minutes.

        - alert: KanaryRollbackSpike
          expr: |
            increase(kanary_canary_rollbacks_total[15m]) > 3
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Rollback spike in namespace {{ "{{" }} $labels.namespace {{ "}}" }}"
            description: >-
              {{ "{{" }} $value {{ "}}" }} rollbacks in the last 15 minutes
              (namespace={{ "{{" }} $labels.namespace {{ "}}" }}).

        - alert: KanaryReconcileLatencyHigh
          expr: |
            histogram_quantile(0.95,
              rate(kanary_reconcile_duration_seconds_bucket[5m])) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Kanary reconcile p95 latency is high"
            description: >-
              Reconcile p95 latency is {{ "{{" }} $value | humanizeDuration {{ "}}" }},
              exceeding the 2 s threshold.

        - alert: KanaryProviderErrors
          expr: |
            increase(kanary_provider_errors_total[10m]) > 5
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Metric provider errors in namespace {{ "{{" }} $labels.namespace {{ "}}" }}"
            description: >-
              {{ "{{" }} $value {{ "}}" }} provider errors in the last 10 minutes
              (provider={{ "{{" }} $labels.provider {{ "}}" }}, kind={{ "{{" }} $labels.kind {{ "}}" }}).
{{- end }}
